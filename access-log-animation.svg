<svg width="1000" height="400" viewBox="0 0 1000 400"
     xmlns="http://www.w3.org/2000/svg">

  <rect width="1000" height="400" rx="12" fill="#151b23"/>

  <style>
    text {
      font-family: "Courier New", monospace;
      font-size: 18px;
      fill: #e6edf3;
    }

    .info { fill: #58a6ff; }
    .ok   { fill: #39ff14; }
    .warn { fill: #f2cc60; }
    .welcome { fill: #79c0ff; }

    .line {
      opacity: 0;
      animation: appear 0.15s forwards;
    }

    @keyframes appear {
      from {
        opacity: 0;
        transform: translateX(-5px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .cursor {
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%, 45% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
  </style>

  <!-- Connection -->

  <text x="35" y="50" class="line" style="animation-delay:0.5s">
    <tspan class="info">[INFO]</tspan>
    <tspan dx="20">Visitor connection established</tspan>
  </text>

  <text x="35" y="85" class="line" style="animation-delay:1.2s">
    <tspan class="info">[INFO]</tspan>
    <tspan dx="20">Secure handshake completed</tspan>
  </text>

  <!-- System initialization -->

  <text x="35" y="120" class="line" style="animation-delay:1.9s">
    <tspan class="ok">[ OK ]</tspan>
    <tspan dx="20">Developer profile decrypted</tspan>
  </text>

  <text x="35" y="155" class="line" style="animation-delay:2.6s">
    <tspan class="ok">[ OK ]</tspan>
    <tspan dx="20">AI Core initialized</tspan>
  </text>

  <text x="35" y="190" class="line" style="animation-delay:3.3s">
    <tspan class="ok">[ OK ]</tspan>
    <tspan dx="20">Microservices cluster connected</tspan>
  </text>

  <!-- Warning -->

  <text x="35" y="225" class="line" style="animation-delay:4s">
    <tspan class="warn">[WARN]</tspan>
    <tspan dx="20">Excessive curiosity detected</tspan>
  </text>

  <!-- Final initialization -->

  <text x="35" y="260" class="line" style="animation-delay:4.7s">
    <tspan class="info">[INFO]</tspan>
    <tspan dx="20">Coffee dependency: STABLE</tspan>
  </text>

  <text x="35" y="295" class="line" style="animation-delay:5.4s">
    <tspan class="ok">[ OK ]</tspan>
    <tspan dx="20">System ready</tspan>
  </text>

  <!-- Welcome -->

  <text x="35" y="355"
        class="welcome line"
        font-weight="bold"
        style="animation-delay:6.3s">
    &gt;&gt;&gt; Welcome to Bunty's Cyberdeck.
  </text>

  <!-- Blinking cursor -->

  <rect x="405"
        y="338"
        width="11"
        height="21"
        fill="#39ff14"
        class="cursor"/>

</svg>
